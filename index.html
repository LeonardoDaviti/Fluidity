<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>FluidForm B/W</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <section class="preview-column" aria-label="Artwork preview">
        <div id="stage" class="stage">
          <canvas id="previewCanvas" aria-label="Generated fluid art canvas"></canvas>
        </div>
        <div class="preview-actions">
          <button id="regenBtn" type="button">Regenerate</button>
          <button id="randomSeedBtn" type="button">Random Seed</button>
          <button id="downloadBtn" type="button">Export PNG</button>
          <label class="inline-check" for="liveEvolve">
            <input id="liveEvolve" type="checkbox">
            Live Evolve
          </label>
          <span id="status" role="status" aria-live="polite"></span>
        </div>
      </section>

      <aside class="controls-column" aria-label="Generation controls">
        <h1>FluidForm B/W</h1>
        <p class="lead">Generate black-and-white fluid art with deterministic seed control.</p>

        <div class="control-group">
          <h2>Canvas</h2>

          <div class="control">
            <label for="preset">Preset</label>
            <select id="preset">
              <option value="custom">Custom</option>
              <option value="calm">Calm Marble</option>
              <option value="storm">Storm Ink</option>
              <option value="silk">Silk Flow</option>
              <option value="hard">High Contrast</option>
            </select>
          </div>

          <div class="control">
            <label for="aspect">Aspect Ratio</label>
            <select id="aspect">
              <option value="1:1">1:1 Square</option>
              <option value="3:4" selected>3:4 Portrait</option>
              <option value="2:3">2:3 Portrait</option>
              <option value="9:16">9:16 Portrait</option>
              <option value="4:3">4:3 Landscape</option>
              <option value="16:9">16:9 Landscape</option>
              <option value="custom">Custom</option>
            </select>
          </div>

          <div id="customAspectRow" class="control-inline hidden">
            <div class="control">
              <label for="aspectW">Custom Width</label>
              <input id="aspectW" type="number" min="1" max="32" step="1" value="3">
            </div>
            <div class="control">
              <label for="aspectH">Custom Height</label>
              <input id="aspectH" type="number" min="1" max="32" step="1" value="4">
            </div>
          </div>

          <div class="control">
            <label for="longEdge">Generation Size <output id="longEdgeValue"></output></label>
            <input id="longEdge" type="range" min="320" max="1600" step="16" value="720">
          </div>

          <div class="control">
            <label for="displaySize">Art Display Size <output id="displaySizeValue"></output></label>
            <input id="displaySize" type="range" min="220" max="780" step="10" value="420">
          </div>

          <div class="control">
            <label for="stageWidth">Background Width <output id="stageWidthValue"></output></label>
            <input id="stageWidth" type="range" min="340" max="920" step="10" value="560">
          </div>

          <div class="control">
            <label for="stageHeight">Background Height <output id="stageHeightValue"></output></label>
            <input id="stageHeight" type="range" min="340" max="920" step="10" value="560">
          </div>

          <div class="control">
            <label for="exportScale">Export Scale <output id="exportScaleValue"></output></label>
            <input id="exportScale" type="range" min="1" max="4" step="1" value="2">
          </div>

          <div class="control">
            <label for="seed">Seed</label>
            <input id="seed" type="number" min="1" max="999999999" step="1" value="144221">
          </div>
        </div>

        <div class="control-group">
          <h2>Flow</h2>

          <div class="control">
            <label for="flow">Flow Strength <output id="flowValue"></output></label>
            <input id="flow" type="range" min="0" max="2" step="0.01" value="0.82">
          </div>

          <div class="control">
            <label for="direction">Flow Direction <output id="directionValue"></output></label>
            <input id="direction" type="range" min="0" max="360" step="1" value="38">
          </div>

          <div class="control">
            <label for="swirl">Swirl <output id="swirlValue"></output></label>
            <input id="swirl" type="range" min="0" max="3" step="0.01" value="1.24">
          </div>

          <div class="control">
            <label for="turbulence">Turbulence <output id="turbulenceValue"></output></label>
            <input id="turbulence" type="range" min="0" max="2" step="0.01" value="0.68">
          </div>

          <div class="control">
            <label for="viscosity">Viscosity <output id="viscosityValue"></output></label>
            <input id="viscosity" type="range" min="0" max="1" step="0.01" value="0.44">
          </div>

          <div class="control">
            <label for="scale">Pattern Scale <output id="scaleValue"></output></label>
            <input id="scale" type="range" min="0.8" max="6" step="0.01" value="2.85">
          </div>

          <div class="control">
            <label for="detail">Detail Layers <output id="detailValue"></output></label>
            <input id="detail" type="range" min="2" max="7" step="1" value="5">
          </div>

          <div class="control">
            <label for="evolveSpeed">Evolve Speed <output id="evolveSpeedValue"></output></label>
            <input id="evolveSpeed" type="range" min="0" max="2" step="0.01" value="0.42">
          </div>
        </div>

        <div class="control-group">
          <h2>Tone</h2>

          <div class="control">
            <label for="contrast">Contrast <output id="contrastValue"></output></label>
            <input id="contrast" type="range" min="0.3" max="3" step="0.01" value="1.42">
          </div>

          <div class="control">
            <label for="softness">Edge Softness <output id="softnessValue"></output></label>
            <input id="softness" type="range" min="0.005" max="0.25" step="0.001" value="0.08">
          </div>

          <div class="control">
            <label for="dominance">Black Dominance <output id="dominanceValue"></output></label>
            <input id="dominance" type="range" min="-1" max="1" step="0.01" value="0.12">
          </div>

          <div class="control">
            <label for="grain">Grain <output id="grainValue"></output></label>
            <input id="grain" type="range" min="0" max="0.22" step="0.001" value="0.045">
          </div>

          <div class="control">
            <label for="symmetry">Symmetry</label>
            <select id="symmetry">
              <option value="none">None</option>
              <option value="horizontal">Horizontal</option>
              <option value="vertical">Vertical</option>
              <option value="both">Both</option>
              <option value="radial">Radial</option>
            </select>
          </div>

          <label class="inline-check" for="invert">
            <input id="invert" type="checkbox">
            Invert Colors
          </label>
        </div>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
